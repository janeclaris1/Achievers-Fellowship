# Supabase Configuration
# https://supabase.com/docs/reference/cli/config

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://archeivers-fellowship.vercel.app"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[functions.birthday-cron]
verify_jwt = false

[functions.ai-birthday-message]
verify_jwt = true

[functions.ai-followup-report]
verify_jwt = true

[functions.ai-call-report]
verify_jwt = true

[functions.create-user]
verify_jwt = true

[functions.ai-welfare-report]
verify_jwt = true

[functions.send-sms]
verify_jwt = true

[functions.make-call]
verify_jwt = true

[functions.send-email]
verify_jwt = true
